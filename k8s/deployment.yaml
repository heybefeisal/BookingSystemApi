apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookingsystem-api
  labels:
    app: bookingsystem-api
    version: v1

spec:
  replicas: 2

  selector:
    matchLabels:
      app: bookingsystem-api

  template:
    metadata:
      labels:
        app: bookingsystem-api
        version: v1

    spec:
      containers:
        - name: bookingsystem-api
          image: bookingsystemacr2026.azurecr.io/bookingsystemapi:v1
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"

            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: CONNECTION_STRING

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"