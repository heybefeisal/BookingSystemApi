services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bookingsystem-db
    environment:
      SA_PASSWORD: "Password123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - bookingsystem_sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password123!' -Q 'SELECT 1' -No || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Password123!' -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookingsystem-api
    ports:
      - "5080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=db;Database=BookingDB;User Id=sa;Password=Password123!;TrustServerCertificate=True;MultipleActiveResultSets=true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  bookingsystem_sql_data: